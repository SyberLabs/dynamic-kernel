<svg xmlns="http://www.w3.org/2000/svg" width="920" height="460" viewBox="0 0 920 460">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
.title { font-size: 20px; font-weight: 700; }
.subtitle { font-size: 12px; fill: #4b5563; }
.axis { font-size: 11px; fill: #4b5563; }
.label { font-size: 12px; }
.small { font-size: 10px; fill: #4b5563; }
.node { font-size: 11px; font-weight: 700; }
</style>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
<text x="24" y="30" class="title">DTE layered-memory state</text>
<text x="24" y="50" class="subtitle">The process is Markov only after structural, preference, state, ecology, and delayed buffers are included.</text>
<rect x="50" y="150" width="135" height="86" rx="8" fill="#e0f2fe" stroke="#374151"/>
<text x="117.5" y="176" text-anchor="middle" class="node">Position / occupancy</text>
<text x="117.5" y="192" text-anchor="middle" class="small">X_t</text>
<rect x="220" y="150" width="135" height="86" rx="8" fill="#dcfce7" stroke="#374151"/>
<text x="287.5" y="176" text-anchor="middle" class="node">State memory</text>
<text x="287.5" y="192" text-anchor="middle" class="small">A_t telemetry</text>
<rect x="390" y="132" width="135" height="86" rx="8" fill="#fef3c7" stroke="#374151"/>
<text x="457.5" y="158" text-anchor="middle" class="node">Structural memory</text>
<text x="457.5" y="174" text-anchor="middle" class="small">M_s topology, gates,</text>
<text x="457.5" y="190" text-anchor="middle" class="small">contracts, capacity</text>
<rect x="590" y="132" width="135" height="86" rx="8" fill="#ede9fe" stroke="#374151"/>
<text x="657.5" y="158" text-anchor="middle" class="node">Preference memory</text>
<text x="657.5" y="174" text-anchor="middle" class="small">M_p beta, S,</text>
<text x="657.5" y="190" text-anchor="middle" class="small">policy lanes</text>
<rect x="745" y="150" width="135" height="86" rx="8" fill="#fee2e2" stroke="#374151"/>
<text x="812.5" y="176" text-anchor="middle" class="node">Delayed buffers</text>
<text x="812.5" y="192" text-anchor="middle" class="small">B_t pending rewards,</text>
<text x="812.5" y="208" text-anchor="middle" class="small">attribution records</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker></defs>
<line x1="185" y1="193" x2="220" y2="193" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="355" y1="193" x2="390" y2="193" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="525" y1="193" x2="590" y2="193" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="725" y1="193" x2="745" y2="193" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
<rect x="275" y="302" width="370" height="72" rx="8" fill="#f9fafb" stroke="#374151"/>
<text x="460" y="330" text-anchor="middle" class="node">Ecology R_t</text>
<text x="460" y="352" text-anchor="middle" class="small">reward, stock, demand, hazard, service capacity</text>
<line x1="460" y1="302" x2="460" y2="242" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
<path d="M812 236 C812 296 108 296 108 236" fill="none" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="460" y="408" text-anchor="middle" class="subtitle">Z_t = (X_t, A_t, M_s(t), M_p(t), B_t, R_t)</text>
</svg>