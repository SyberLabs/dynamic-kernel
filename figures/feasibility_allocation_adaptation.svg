<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
.title { font-size: 20px; font-weight: 700; }
.subtitle { font-size: 12px; fill: #4b5563; }
.axis { font-size: 11px; fill: #4b5563; }
.label { font-size: 12px; }
.small { font-size: 10px; fill: #4b5563; }
.node { font-size: 11px; font-weight: 700; }
</style>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
<text x="24" y="30" class="title">Feasibility, allocation, and adaptation</text>
<text x="24" y="50" class="subtitle">A route can be attractive, selected, and still fail as a completed viable transition.</text>
<defs><marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker></defs>
<rect x="70" y="145" width="145" height="95" rx="8" fill="#e0f2fe" stroke="#374151"/>
<text x="142.5" y="172" text-anchor="middle" class="node">Attractiveness</text>
<text x="142.5" y="188" text-anchor="middle" class="small">route looks good</text>
<rect x="275" y="145" width="145" height="95" rx="8" fill="#dcfce7" stroke="#374151"/>
<text x="347.5" y="172" text-anchor="middle" class="node">Allocation</text>
<text x="347.5" y="188" text-anchor="middle" class="small">agents choose route</text>
<rect x="480" y="126" width="145" height="95" rx="8" fill="#fef3c7" stroke="#374151"/>
<text x="552.5" y="153" text-anchor="middle" class="node">Feasibility</text>
<text x="552.5" y="169" text-anchor="middle" class="small">BOM, capacity,</text>
<text x="552.5" y="185" text-anchor="middle" class="small">service gates</text>
<rect x="685" y="126" width="145" height="95" rx="8" fill="#ede9fe" stroke="#374151"/>
<text x="757.5" y="153" text-anchor="middle" class="node">Completed transition</text>
<text x="757.5" y="169" text-anchor="middle" class="small">finished lots,</text>
<text x="757.5" y="185" text-anchor="middle" class="small">robust share</text>
<line x1="215" y1="192" x2="275" y2="192" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow3)"/>
<line x1="420" y1="192" x2="480" y2="192" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow3)"/>
<line x1="625" y1="192" x2="685" y2="192" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow3)"/>
<path d="M757 221 C720 320 275 320 168 221" fill="none" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow3)"/>
<text x="460" y="335" text-anchor="middle" class="subtitle">Adaptation: completed or blocked outcomes reshape future telemetry and preference memory.</text>
<text x="460" y="372" text-anchor="middle" class="subtitle">Paper boundary: route share is not evidence of institutional viability without completion.</text>
</svg>