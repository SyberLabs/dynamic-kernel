<svg xmlns="http://www.w3.org/2000/svg" width="940" height="470" viewBox="0 0 940 470">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
.title { font-size: 20px; font-weight: 700; }
.subtitle { font-size: 12px; fill: #4b5563; }
.axis { font-size: 11px; fill: #4b5563; }
.label { font-size: 12px; }
.small { font-size: 10px; fill: #4b5563; }
.node { font-size: 11px; font-weight: 700; }
</style>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
<text x="24" y="30" class="title">Dynamic Topology Engine mechanism</text>
<text x="24" y="50" class="subtitle">Telemetry-aligned softmax routing couples movement, state feedback, and memory updates.</text>
<defs><marker id="arrow0" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker></defs>
<rect x="55" y="140" width="130" height="96" rx="8" fill="#e0f2fe" stroke="#374151"/>
<text x="120" y="165" text-anchor="middle" class="node">Graph G=(V,E)</text>
<text x="120" y="181" text-anchor="middle" class="small">D, node features N</text>
<rect x="235" y="140" width="130" height="96" rx="8" fill="#dcfce7" stroke="#374151"/>
<text x="300" y="165" text-anchor="middle" class="node">Agent state</text>
<text x="300" y="181" text-anchor="middle" class="small">X_t, a_t</text>
<rect x="405" y="118" width="130" height="96" rx="8" fill="#fef3c7" stroke="#374151"/>
<text x="470" y="143" text-anchor="middle" class="node">Dynamic weights</text>
<text x="470" y="159" text-anchor="middle" class="small">W_ij = alpha D_ij</text>
<text x="470" y="175" text-anchor="middle" class="small">- beta_ij A_j - S_ij</text>
<rect x="610" y="118" width="130" height="96" rx="8" fill="#ede9fe" stroke="#374151"/>
<text x="675" y="143" text-anchor="middle" class="node">Softmax routing</text>
<text x="675" y="159" text-anchor="middle" class="small">P_ij proportional to</text>
<text x="675" y="175" text-anchor="middle" class="small">exp(-W_ij/tau)</text>
<rect x="780" y="140" width="130" height="96" rx="8" fill="#fee2e2" stroke="#374151"/>
<text x="845" y="165" text-anchor="middle" class="node">Move + observe</text>
<text x="845" y="181" text-anchor="middle" class="small">X_{t+1}, reward,</text>
<text x="845" y="197" text-anchor="middle" class="small">traffic</text>
<line x1="185" y1="188" x2="235" y2="188" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow0)"/>
<line x1="365" y1="188" x2="405" y2="188" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow0)"/>
<line x1="535" y1="188" x2="610" y2="188" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow0)"/>
<line x1="740" y1="188" x2="780" y2="188" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow0)"/>
<rect x="250" y="315" width="190" height="72" rx="8" fill="#f9fafb" stroke="#374151"/>
<text x="345" y="343" text-anchor="middle" class="node">Telemetry feedback</text>
<text x="345" y="365" text-anchor="middle" class="small">a_{t+1} = norm((1-lambda)a_t + lambda N_j + eps)</text>
<rect x="515" y="315" width="190" height="72" rx="8" fill="#f9fafb" stroke="#374151"/>
<text x="610" y="343" text-anchor="middle" class="node">Preference memory</text>
<text x="610" y="365" text-anchor="middle" class="small">beta, friction deltas, policy lanes</text>
<path d="M845 236 C820 304 690 320 610 315" fill="none" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow0)"/>
<path d="M790 236 C700 292 455 300 345 315" fill="none" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow0)"/>
<path d="M610 315 C560 270 520 238 505 218" fill="none" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrow0)"/>
</svg>